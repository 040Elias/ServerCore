name: ServerCore
version: '${version}'
main: org.Elias040.servercore.Main
api-version: '1.21'
prefix: ServerCore
authors: [040Elias]
description: A Folia Plugin with Core Features for a Server
folia-supported: true

commands:
  spawn:
    usage: /spawn [name]
    permission: servercore.spawn.use
    default: true
  setspawn:
    usage: /setspawn <n>
    permission: servercore.spawn.setspawn
  delspawn:
    usage: /delspawn <n>
    permission: servercore.spawn.delspawn
  invsee:
    usage: /invsee <player>
    permission: servercore.invsee
  broadcast:
    usage: /broadcast <message>
    permission: servercore.broadcast
  nightvision:
    usage: /nightvision
    permission: servercore.nightvision
    aliases: [nv]
  ping:
    usage: /ping [player]
    permission: servercore.ping
  freeze:
    usage: /freeze <player>
    permission: servercore.freeze
  unfreeze:
    usage: /unfreeze <player>
    permission: servercore.unfreeze
  whois:
    usage: /whois <player>
    permission: servercore.whois.use
  msg:
    usage: /msg <player> <message>
    permission: servercore.msg
    aliases: [message, tell, whisper]
  reply:
    usage: /reply <message>
    permission: servercore.msg
    aliases: [r]
  discord:
    usage: /discord
    permission: servercore.discord
    default: true
  live:
    usage: /live <url>
    permission: servercore.live
  servercore:
    usage: /servercore reload
    permission: servercore.reload
  gm:
    usage: /gm <mode> [player]
    permission: servercore.gamemode
  gmc:
    usage: /gmc [player]
    permission: servercore.gamemode
    aliases: []
  gms:
    usage: /gms [player]
    permission: servercore.gamemode
  gma:
    usage: /gma [player]
    permission: servercore.gamemode
  gmsp:
    usage: /gmsp [player]
    permission: servercore.gamemode
  media:
    usage: /media
    permission: servercore.media
    default: true

permissions:
  servercore.spawn.setspawn:
    default: op
  servercore.spawn.delspawn:
    default: op
  servercore.spawn.use:
    default: true
  servercore.invsee:
    default: op
  servercore.broadcast:
    default: op
  servercore.nightvision:
    default: op
  servercore.ping:
    default: true
  servercore.ping.other:
    default: op
  servercore.freeze:
    default: op
  servercore.freeze.bypass:
    default: false
  servercore.freeze.notify:
    default: op
  servercore.unfreeze:
    default: op
  servercore.whois.use:
    default: op
  servercore.whois.sensitive:
    default: op
  servercore.join.silent:
    default: false
  servercore.msg:
    default: true
  servercore.discord:
    default: true
  servercore.live:
    default: op
  servercore.gamemode:
    description: "Change own gamemode (all modes)"
    default: op
    children:
      servercore.gamemode.survival: true
      servercore.gamemode.creative: true
      servercore.gamemode.adventure: true
      servercore.gamemode.spectator: true
  servercore.gamemode.survival:
    default: op
  servercore.gamemode.creative:
    default: op
  servercore.gamemode.adventure:
    default: op
  servercore.gamemode.spectator:
    default: op
  servercore.gamemode.other:
    default: op
  servercore.media:
    default: true
  servercore.reload:
    default: op